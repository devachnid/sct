name: Auto-tag on version bump

# When a push to main bumps the version in Cargo.toml, create and push the
# matching `v<version>` tag, then invoke the release workflow with that tag.
#
# We invoke release.yml via `workflow_call` rather than relying on the tag
# push to trigger it, because pushes performed via the default GITHUB_TOKEN
# do not trigger downstream workflows (anti-recursion safeguard). Manual
# tag pushes from a developer's terminal still trigger release.yml via its
# `push: tags` trigger; both paths converge on the same release pipeline.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Detect version bump and create tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      bumped: ${{ steps.bump.outputs.bumped }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need the previous commit to diff Cargo.toml against.
          fetch-depth: 2
          # Use the default GITHUB_TOKEN for the checkout; the tag push below
          # uses the same token (sufficient for pushing back to this repo).
          persist-credentials: true

      - name: Detect Cargo.toml version change
        id: bump
        run: |
          new=$(grep -m1 '^version = "' Cargo.toml | cut -d'"' -f2)
          old=$(git show HEAD~1:Cargo.toml 2>/dev/null \
                  | grep -m1 '^version = "' | cut -d'"' -f2 || echo "")

          if [ -z "$new" ]; then
            echo "::warning::Could not read version from Cargo.toml"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$new" = "$old" ]; then
            echo "No version change ($new == $old) - nothing to tag."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="v$new"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists - assuming a previous run created it."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Cargo.toml: $old → $new"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "bumped=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.bump.outputs.bumped == 'true'
        run: |
          tag="${{ steps.bump.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

  release:
    # Run the matrix build, GitHub Release, crates.io publish, and tap/bucket
    # updates from release.yml against the freshly-pushed tag. Using
    # workflow_call sidesteps the GITHUB_TOKEN anti-recursion rule.
    needs: tag
    if: needs.tag.outputs.bumped == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
    secrets: inherit
