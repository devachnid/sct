name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo clippy (serve feature)
        run: cargo clippy --features serve --all-targets -- -D warnings

      - name: cargo clippy (dmwb feature)
        run: cargo clippy --features dmwb --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      - name: cargo test (serve feature)
        run: cargo test --features serve

      - name: Install FHIR conformance tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq sqlite3 curl

      - name: FHIR conformance gate (sct serve vs committed RF2 fixture)
        run: |
          cargo build --bin sct
          SCT_BIN=target/debug/sct benchmarks/conformance-ci.sh

  # The release matrix builds Windows, but the test job above is Linux-only -
  # a Windows-only compile break (e.g. a dependency accidentally scoped to
  # [target.'cfg(unix)'], which shipped broken in v0.17.0) would otherwise
  # surface for the first time inside the release pipeline. cargo check
  # compiles the same graph as the release build without codegen.
  windows-check:
    name: Windows check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-

      - name: cargo check (default features, mirrors the release build)
        run: cargo check

      - name: cargo check --features full
        run: cargo check --features full

  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0

  # Coverage is report-only: a blind-spot finder, not a quality gate (no
  # --fail-under). cargo-llvm-cov is used deliberately over tarpaulin because the
  # assert_cmd suites (tests/cli.rs, trud_api.rs, embed_semantic.rs, snapshots.rs)
  # drive `sct` as a subprocess - llvm-cov builds that binary instrumented and
  # inherits LLVM_PROFILE_FILE into the child, so subprocess coverage is counted;
  # tarpaulin would miss it. The report uploads as an artifact and a per-file
  # table is written to the job summary so thin spots are visible at a glance.
  coverage:
    name: Coverage (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-coverage-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: cargo-llvm-cov@0.8.7

      # --features full measures the gated code (serve/gui/dmwb/tui/diagram-svg),
      # not just the default build. Run once with --no-report, then render.
      - name: Run the suite under coverage instrumentation
        run: cargo llvm-cov --no-report --features full

      - name: Generate lcov + HTML reports
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --html

      - name: Write per-file coverage table to the job summary
        run: |
          {
            echo '## Coverage (report-only - a blind-spot finder, not a quality gate)'
            echo
            echo '```'
            cargo llvm-cov report
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report (lcov + HTML)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            lcov.info
            target/llvm-cov/html
          if-no-files-found: error
