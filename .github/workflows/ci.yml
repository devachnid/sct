name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo clippy (serve feature)
        run: cargo clippy --features serve --all-targets -- -D warnings

      - name: cargo clippy (dmwb feature)
        run: cargo clippy --features dmwb --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      - name: cargo test (serve feature)
        run: cargo test --features serve

      - name: Install FHIR conformance tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq sqlite3 curl

      - name: FHIR conformance gate (sct serve vs committed RF2 fixture)
        run: |
          cargo build --bin sct
          SCT_BIN=target/debug/sct benchmarks/conformance-ci.sh

  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
