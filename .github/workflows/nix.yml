name: Nix flake

# Prove flake.nix still builds a working `sct`, so it cannot silently bit-rot as
# the code (or nixpkgs) moves. Path-filtered so doc-only commits don't trigger a
# full from-scratch Rust compile in the Nix sandbox.
on:
  push:
    branches: [main]
    paths: &paths
      - "flake.nix"
      - "flake.lock"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - ".github/workflows/nix.yml"
  pull_request:
    paths: *paths
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake:
    name: nix build + flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Build the package
        run: nix build --print-build-logs .#sct

      - name: Validate the flake outputs
        run: nix flake check --print-build-logs

      - name: Smoke-test the binary
        run: nix run .#sct -- --version
