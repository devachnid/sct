# Publishes the static Linux release binaries to the Arch User Repository as
# `sct-rs-bin`. Reusable from release.yml and manually dispatchable so an
# existing GitHub release can bootstrap or repair the AUR package.
#
# Repository prerequisite: the GitHub `aur` environment must contain the
# `AUR_SSH_PRIVATE_KEY` secret, whose public key is registered on the
# `pacharanero` AUR account. The AUR SSH username is always `aur`; package
# ownership is determined by the registered key.

name: publish-aur

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.18.6"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing GitHub release tag to publish, e.g. v0.18.5"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: aur-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish sct-rs-bin
    runs-on: ubuntu-latest
    environment: aur

    steps:
      - name: Resolve release metadata
        id: release
        env:
          TAG: ${{ inputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          if [[ "$TAG" != "v$version" || ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $TAG (expected vMAJOR.MINOR.PATCH)" >&2
            exit 1
          fi

          release_url="https://github.com/${REPOSITORY}/releases/download/${TAG}"
          curl --fail --silent --show-error --location \
            --retry 10 --retry-all-errors --retry-delay 15 \
            "$release_url/SHA256SUMS" -o SHA256SUMS

          checksum() {
            local filename="$1"
            local value
            value="$(awk -v filename="$filename" '$2 == filename { print $1 }' SHA256SUMS)"
            if [[ ! "$value" =~ ^[0-9a-f]{64}$ ]]; then
              echo "Missing or invalid checksum for $filename" >&2
              exit 1
            fi
            printf '%s' "$value"
          }

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_url=$release_url" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$(checksum sct-linux-x86_64.tar.gz)" >> "$GITHUB_OUTPUT"
          echo "linux_aarch64=$(checksum sct-linux-aarch64.tar.gz)" >> "$GITHUB_OUTPUT"

      - name: Configure AUR SSH key
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "$AUR_SSH_PRIVATE_KEY" ]]; then
            echo "AUR_SSH_PRIVATE_KEY is missing from the GitHub 'aur' environment" >&2
            exit 1
          fi
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' > "$HOME/.ssh/aur"
          chmod 600 "$HOME/.ssh/aur"
          ssh-keyscan -H aur.archlinux.org >> "$HOME/.ssh/known_hosts"
          cat >> "$HOME/.ssh/config" <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            BatchMode yes
          EOF
          chmod 600 "$HOME/.ssh/config"

      - name: Generate AUR package
        env:
          VERSION: ${{ steps.release.outputs.version }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          SHA_X86_64: ${{ steps.release.outputs.linux_x86_64 }}
          SHA_AARCH64: ${{ steps.release.outputs.linux_aarch64 }}
        run: |
          set -euo pipefail
          git clone ssh://aur@aur.archlinux.org/sct-rs-bin.git aur
          cd aur

          cat > PKGBUILD <<'EOF'
          # Maintainer: Marcus Baw <marcus@bawmedical.co.uk>
          pkgname=sct-rs-bin
          pkgver=@VERSION@
          pkgrel=1
          pkgdesc="Local-first SNOMED CT toolchain"
          arch=('x86_64' 'aarch64')
          url="https://github.com/pacharanero/sct"
          license=('AGPL-3.0-or-later')
          provides=("sct-rs=${pkgver}")
          conflicts=('sct-rs' 'sct')
          source_x86_64=("sct-rs-bin-${pkgver}-x86_64.tar.gz::@RELEASE_URL@/sct-linux-x86_64.tar.gz")
          source_aarch64=("sct-rs-bin-${pkgver}-aarch64.tar.gz::@RELEASE_URL@/sct-linux-aarch64.tar.gz")
          sha256sums_x86_64=('@SHA_X86_64@')
          sha256sums_aarch64=('@SHA_AARCH64@')

          package() {
            install -Dm755 "${srcdir}/sct" "${pkgdir}/usr/bin/sct"

            "${srcdir}/sct" completions bash > sct.bash
            "${srcdir}/sct" completions zsh > _sct
            "${srcdir}/sct" completions fish > sct.fish
            install -Dm644 sct.bash "${pkgdir}/usr/share/bash-completion/completions/sct"
            install -Dm644 _sct "${pkgdir}/usr/share/zsh/site-functions/_sct"
            install -Dm644 sct.fish "${pkgdir}/usr/share/fish/vendor_completions.d/sct.fish"
          }
          EOF
          sed -i \
            -e "s|@VERSION@|${VERSION}|g" \
            -e "s|@RELEASE_URL@|${RELEASE_URL}|g" \
            -e "s|@SHA_X86_64@|${SHA_X86_64}|g" \
            -e "s|@SHA_AARCH64@|${SHA_AARCH64}|g" \
            PKGBUILD

          {
            printf 'pkgbase = sct-rs-bin\n'
            printf '\tpkgdesc = Local-first SNOMED CT toolchain\n'
            printf '\tpkgver = %s\n' "$VERSION"
            printf '\tpkgrel = 1\n'
            printf '\turl = https://github.com/pacharanero/sct\n'
            printf '\tarch = x86_64\n'
            printf '\tarch = aarch64\n'
            printf '\tlicense = AGPL-3.0-or-later\n'
            printf '\tprovides = sct-rs=%s\n' "$VERSION"
            printf '\tconflicts = sct-rs\n'
            printf '\tconflicts = sct\n'
            printf '\tsource_x86_64 = sct-rs-bin-%s-x86_64.tar.gz::%s/sct-linux-x86_64.tar.gz\n' "$VERSION" "$RELEASE_URL"
            printf '\tsha256sums_x86_64 = %s\n' "$SHA_X86_64"
            printf '\tsource_aarch64 = sct-rs-bin-%s-aarch64.tar.gz::%s/sct-linux-aarch64.tar.gz\n' "$VERSION" "$RELEASE_URL"
            printf '\tsha256sums_aarch64 = %s\n' "$SHA_AARCH64"
            printf '\n'
            printf 'pkgname = sct-rs-bin\n'
          } > .SRCINFO

      - name: Validate package inputs
        env:
          VERSION: ${{ steps.release.outputs.version }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          SHA_X86_64: ${{ steps.release.outputs.linux_x86_64 }}
          SHA_AARCH64: ${{ steps.release.outputs.linux_aarch64 }}
        run: |
          set -euo pipefail
          bash -n aur/PKGBUILD
          for arch in x86_64 aarch64; do
            archive="sct-linux-${arch}.tar.gz"
            curl --fail --silent --show-error --location \
              --retry 10 --retry-all-errors --retry-delay 15 \
              "$RELEASE_URL/$archive" -o "$archive"
          done
          printf '%s  %s\n' "$SHA_X86_64" sct-linux-x86_64.tar.gz | sha256sum --check --strict
          printf '%s  %s\n' "$SHA_AARCH64" sct-linux-aarch64.tar.gz | sha256sum --check --strict
          mkdir smoke
          tar -xzf sct-linux-x86_64.tar.gz -C smoke
          test "$(smoke/sct --version)" = "sct-rs $VERSION"
          smoke/sct completions bash > /dev/null
          smoke/sct completions zsh > /dev/null
          smoke/sct completions fish > /dev/null

      - name: Publish to AUR
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          cd aur
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "sct-rs-bin $VERSION is already current in AUR"
            exit 0
          fi
          git -c user.name="sct release bot" \
              -c user.email="bot@sct.baw.medical" \
              commit -m "bump sct-rs-bin to v$VERSION"
          git push origin HEAD:master
