name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: "Tag to release, e.g. v0.3.11"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: sct
            archive: sct-linux-x86_64.tar.gz
            deb: sct-linux-x86_64.deb
            rpm: sct-linux-x86_64.rpm
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            binary: sct
            archive: sct-linux-aarch64.tar.gz
            deb: sct-linux-aarch64.deb
            rpm: sct-linux-aarch64.rpm
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: sct
            archive: sct-macos-aarch64.tar.gz
            dmg: sct-macos-aarch64.dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: sct
            archive: sct-macos-x86_64.tar.gz
            dmg: sct-macos-x86_64.dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: sct.exe
            archive: sct-windows-x86_64.zip
            exe: sct-windows-x86_64.exe

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install musl tools (Linux musl targets only)
        if: endsWith(matrix.target, '-unknown-linux-musl')
        run: sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist out
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          tar -czf out/${{ matrix.archive }} -C dist ${{ matrix.binary }}

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist, out | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/"
          Compress-Archive -Path "dist/${{ matrix.binary }}" -DestinationPath "out/${{ matrix.archive }}"

      # Linux: .deb (Debian/Ubuntu) and .rpm (Fedora/RHEL/openSUSE). Built from
      # the already-compiled static musl binary; metadata lives in Cargo.toml.
      - name: Install packaging tools (Linux)
        if: matrix.deb != ''
        run: cargo install --locked cargo-deb@3.7.0 cargo-generate-rpm@0.21.0

      - name: Build .deb and .rpm (Linux)
        if: matrix.deb != ''
        run: |
          cargo deb --no-build --target ${{ matrix.target }} --output out/${{ matrix.deb }}
          cargo generate-rpm --target ${{ matrix.target }} --output out/${{ matrix.rpm }}

      # macOS: an (unsigned) .dmg disk image holding the binary + README + LICENSE.
      - name: Build .dmg (macOS)
        if: matrix.dmg != ''
        run: |
          mkdir -p dmgroot
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dmgroot/
          cp README.md LICENSE dmgroot/
          hdiutil create -volname sct -srcfolder dmgroot -ov -format UDZO out/${{ matrix.dmg }}

      # Windows: the bare (unsigned) .exe alongside the .zip, for direct download.
      - name: Stage .exe (Windows)
        if: matrix.exe != ''
        shell: pwsh
        run: Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "out/${{ matrix.exe }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pkg-${{ matrix.target }}
          path: out/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Generate SHA-256 checksums
        working-directory: artifacts
        run: |
          find . -type f \( \
              -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' \
              -o -name '*.rpm' -o -name '*.dmg' -o -name '*.exe' \
            \) -print0 \
            | xargs -0 sha256sum \
            | sed 's|\./[^/]*/||' \
            > ../SHA256SUMS
          cat ../SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          # Explicit tag is needed when invoked via workflow_call, where
          # github.ref points at the caller's branch rather than the tag.
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.dmg
            artifacts/**/*.exe
            SHA256SUMS
          generate_release_notes: true

  build-docker:
    name: Build Docker image (${{ matrix.platform }})
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: linux/arm64
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}

      # Native per-arch runners (rather than QEMU emulation on one runner):
      # cargo build --release inside the Dockerfile compiles at native speed
      # on each architecture, which matters a lot more for a Rust build than
      # for most Dockerfiles. This repo's binary-release matrix already
      # proves ubuntu-24.04-arm works the same way.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: pacharanero
          password: ${{ secrets.DOCKER_HUB_PAT }}

      # Pushes a digest-only, untagged image; the publish-docker job below
      # merges each arch's digest into the final multi-arch tags. Building
      # each platform to its own digest (rather than building both platforms
      # in one buildx call) is what lets each run on its native architecture.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=docker.io/pacharanero/sct,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error

  publish-docker:
    name: Publish multi-arch Docker Hub manifest
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: pacharanero
          password: ${{ secrets.DOCKER_HUB_PAT }}

      # vX.Y.Z (exact), X.Y (floating minor), and latest - all pointing at
      # this release. Explicit tag is needed when invoked via workflow_call,
      # where github.ref points at the caller's branch rather than the tag.
      - name: Compute tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: docker.io/pacharanero/sct
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag || github.ref_name }}
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          tags=$(echo '${{ steps.meta.outputs.json }}' | jq -cr '.tags | map("-t " + .) | join(" ")')
          # shellcheck disable=SC2046,SC2086
          docker buildx imagetools create $tags \
            $(printf 'docker.io/pacharanero/sct@sha256:%s ' *)

      - name: Verify manifest
        run: docker buildx imagetools inspect docker.io/pacharanero/sct:${{ steps.meta.outputs.version }}

  # Mirror the finished multi-arch image to GitHub Container Registry as a
  # second home. GHCR pulls are not rate-limited the way anonymous Docker Hub
  # pulls are (a real problem for CI runners / clusters behind a shared IP), it
  # sits next to the source, and it authenticates with the built-in
  # GITHUB_TOKEN - no extra secret. This job is purely additive: it copies the
  # already-published tags and never touches the Docker Hub jobs above, so a
  # GHCR hiccup cannot break the Docker Hub release.
  #
  # NOTE: a newly-created GHCR package is private; flip it to public once in the
  # repo's package settings for anonymous `docker pull ghcr.io/pacharanero/sct`.
  publish-ghcr:
    name: Mirror the multi-arch image to GHCR
    needs: publish-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same tag set as the Docker Hub manifest, but for the GHCR image.
      - name: Compute tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/pacharanero/sct
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag || github.ref_name }}
            type=raw,value=latest

      # Registry-to-registry copy of the multi-arch manifest (and its blobs)
      # from Docker Hub into GHCR under the same tags - no rebuild.
      - name: Mirror manifest from Docker Hub to GHCR
        run: |
          src="docker.io/pacharanero/sct:${{ steps.meta.outputs.version }}"
          tags=$(echo '${{ steps.meta.outputs.json }}' | jq -cr '.tags | map("-t " + .) | join(" ")')
          # shellcheck disable=SC2046,SC2086
          docker buildx imagetools create $tags "$src"

      - name: Verify manifest
        run: docker buildx imagetools inspect ghcr.io/pacharanero/sct:${{ steps.meta.outputs.version }}

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('Cargo.lock') }}

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # --allow-dirty: `cargo publish` regenerates Cargo.lock when checking the
        # index; in a clean CI checkout the only resulting "dirt" is that synced
        # lockfile, which is correct to ship. Prevents a stale-lock publish abort.
        run: cargo publish --no-verify --allow-dirty

  update-taps:
    name: Update Homebrew tap and Scoop bucket
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: vars
        env:
          # `inputs.tag` set when invoked via workflow_call; otherwise we
          # were triggered by a tag push and GITHUB_REF_NAME holds the tag.
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${INPUT_TAG:-$GITHUB_REF_NAME}"   # e.g. v0.3.11
          version="${tag#v}"                      # e.g. 0.3.11
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Fetch SHA256SUMS from the published release
        id: sums
        run: |
          curl -fsSL \
            "https://github.com/${{ github.repository }}/releases/download/${{ steps.vars.outputs.tag }}/SHA256SUMS" \
            -o SHA256SUMS
          cat SHA256SUMS
          {
            echo "linux_x86_64=$(grep ' sct-linux-x86_64\.tar\.gz$'     SHA256SUMS | awk '{print $1}')"
            echo "linux_aarch64=$(grep ' sct-linux-aarch64\.tar\.gz$'   SHA256SUMS | awk '{print $1}')"
            echo "macos_x86_64=$(grep ' sct-macos-x86_64\.tar\.gz$'     SHA256SUMS | awk '{print $1}')"
            echo "macos_aarch64=$(grep ' sct-macos-aarch64\.tar\.gz$'   SHA256SUMS | awk '{print $1}')"
            echo "windows_x86_64=$(grep ' sct-windows-x86_64\.zip$'     SHA256SUMS | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap (pacharanero/homebrew-tap)
        env:
          GH_TOKEN: ${{ secrets.TAP_REPOS_TOKEN }}
        run: |
          set -eu
          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/pacharanero/homebrew-tap.git" tap
          cd tap

          cat > Formula/sct.rb <<EOF
          class Sct < Formula
            desc "Local-first SNOMED CT toolchain: RF2 → NDJSON, SQLite, Parquet, embeddings, MCP server"
            homepage "https://github.com/pacharanero/sct"
            version "${{ steps.vars.outputs.version }}"
            license "AGPL-3.0-or-later"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/pacharanero/sct/releases/download/v#{version}/sct-macos-aarch64.tar.gz"
                sha256 "${{ steps.sums.outputs.macos_aarch64 }}"
              else
                url "https://github.com/pacharanero/sct/releases/download/v#{version}/sct-macos-x86_64.tar.gz"
                sha256 "${{ steps.sums.outputs.macos_x86_64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/pacharanero/sct/releases/download/v#{version}/sct-linux-aarch64.tar.gz"
                sha256 "${{ steps.sums.outputs.linux_aarch64 }}"
              else
                url "https://github.com/pacharanero/sct/releases/download/v#{version}/sct-linux-x86_64.tar.gz"
                sha256 "${{ steps.sums.outputs.linux_x86_64 }}"
              end
            end

            def install
              bin.install "sct"
            end

            test do
              assert_match "sct #{version}", shell_output("#{bin}/sct --version")
            end
          end
          EOF

          git -c user.name="sct release bot" \
              -c user.email="bot@sct.baw.medical" \
              commit -am "bump sct to v${{ steps.vars.outputs.version }}"
          git push

      - name: Update Scoop bucket (pacharanero/scoop)
        env:
          GH_TOKEN: ${{ secrets.TAP_REPOS_TOKEN }}
        run: |
          set -eu
          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/pacharanero/scoop.git" bucket
          cd bucket

          cat > bucket/sct.json <<EOF
          {
              "version": "${{ steps.vars.outputs.version }}",
              "description": "Local-first SNOMED CT toolchain: RF2 to NDJSON, SQLite, Parquet, embeddings, MCP server",
              "homepage": "https://github.com/pacharanero/sct",
              "license": "AGPL-3.0-or-later",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/pacharanero/sct/releases/download/v${{ steps.vars.outputs.version }}/sct-windows-x86_64.zip",
                      "hash": "${{ steps.sums.outputs.windows_x86_64 }}"
                  }
              },
              "bin": "sct.exe",
              "checkver": {
                  "github": "https://github.com/pacharanero/sct"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/pacharanero/sct/releases/download/v\$version/sct-windows-x86_64.zip"
                      }
                  },
                  "hash": {
                      "url": "https://github.com/pacharanero/sct/releases/download/v\$version/SHA256SUMS",
                      "regex": "(?<sha256>[0-9a-f]{64})\\\\s+sct-windows-x86_64\\\\.zip"
                  }
              }
          }
          EOF

          git -c user.name="sct release bot" \
              -c user.email="bot@sct.baw.medical" \
              commit -am "bump sct to v${{ steps.vars.outputs.version }}"
          git push

  publish-aur:
    name: Publish AUR package
    needs: release
    uses: ./.github/workflows/publish-aur.yml
    with:
      tag: ${{ inputs.tag || github.ref_name }}
    secrets: inherit
